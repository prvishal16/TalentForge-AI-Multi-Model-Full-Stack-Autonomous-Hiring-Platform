version: "3.9"
services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: talentforge
      POSTGRES_USER: talentforge
      POSTGRES_PASSWORD: talentforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: db
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"

volumes:
  pgdata:
